<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#09090d;font-family:'DM Sans',system-ui,sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100svh;max-width:430px;margin:0 auto;background:#0e0e13;position:relative}
#screen{flex:1;overflow-y:auto;padding-bottom:84px}
#screen::-webkit-scrollbar{display:none}
.navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  height:76px;background:#141419ee;backdrop-filter:blur(20px);border-top:1px solid #ffffff12;
  display:flex;align-items:center;justify-content:space-around;
  padding-bottom:max(env(safe-area-inset-bottom,0px),8px);z-index:50}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;
  cursor:pointer;padding:8px 14px;color:#444;font-size:10px;font-weight:600;font-family:inherit;transition:color .2s}
.nb.on{color:#a78bfa}
.nb svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2}
.fab-wrap{position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.fab{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#6366f1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 4px 20px #a78bfa50;z-index:2}
.fab svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.5}
.fab-sub{position:absolute;width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .22s;z-index:1;background:#18181f}
.fab-sub.fv{left:-50px;border:1px solid #22c55e40}
.fab-sub.fn{right:-50px;border:1px solid #f59e0b40}

.fab-sub.fv.hide{left:0}.fab-sub.fn.hide{right:0}
.hdr{padding:16px 14px 10px}
.hdr-date{font-size:11px;color:#444;text-transform:capitalize;margin-bottom:2px}
.hdr-title{font-size:22px;font-weight:700;color:#f0f0f8}
.hdr-sub{font-size:12px;color:#a78bfa;margin-top:2px}
.stat-row{display:flex;gap:8px;margin:0 14px 12px}
.sc{flex:1;background:#18181f;border:1px solid #ffffff08;border-radius:13px;padding:11px;text-align:center}
.sc-n{font-size:21px;font-weight:700}
.sc-l{font-size:10px;color:#444;margin-top:2px}
.div{height:1px;background:#ffffff07;margin:10px 14px}
.sl{padding:0 14px 8px;font-size:10px;font-weight:700;color:#333;text-transform:uppercase;letter-spacing:1px}
.card{background:#18181f;border:1px solid #ffffff0d;border-radius:14px;margin:0 14px 8px;padding:12px 13px;cursor:pointer}
.tag{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;display:inline-flex;align-items:center;gap:3px}
.qcard{background:#18181f;border:1px solid #f59e0b22;border-left:3px solid #f59e0b;border-radius:14px;margin:0 14px 8px;padding:11px 13px}
.note-row{display:flex;align-items:flex-start;gap:7px;background:#ffffff05;border-radius:8px;padding:7px 8px;border:1px solid #ffffff07;margin-bottom:5px}
.note-num{min-width:16px;height:16px;border-radius:50%;background:#a78bfa15;color:#a78bfa;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.overlay{position:fixed;inset:0;background:#000000cc;display:flex;align-items:flex-end;z-index:200;backdrop-filter:blur(4px)}
.modal{width:100%;max-width:430px;margin:0 auto;background:#141419;border-radius:26px 26px 0 0;padding:18px 16px 40px;max-height:90svh;overflow-y:auto}
.modal::-webkit-scrollbar{display:none}
.mh{width:36px;height:4px;background:#ffffff18;border-radius:4px;margin:0 auto 14px}
.fl{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.inp{width:100%;background:#0a0a0f;border:1px solid #ffffff10;border-radius:11px;padding:10px 12px;color:#fff;font-family:inherit;font-size:13px;outline:none}
.inp:focus{border-color:#a78bfa50}
.ta{width:100%;background:#0a0a0f;border:1px solid #ffffff10;border-radius:11px;padding:10px 12px;color:#fff;font-family:inherit;font-size:13px;outline:none;resize:none;min-height:58px;line-height:1.5}
.ta:focus{border-color:#a78bfa50}
.pl{max-height:120px;overflow-y:auto;margin-top:4px}
.pl::-webkit-scrollbar{display:none}
.po{padding:8px 10px;border-radius:9px;cursor:pointer;font-size:13px;color:#999}
.po:active{background:#a78bfa10;color:#c4b5fd}
.sel-p{display:flex;align-items:center;justify-content:space-between;background:#a78bfa12;border:1px solid #a78bfa30;border-radius:11px;padding:10px 12px;margin-bottom:12px}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.type-btn{padding:11px 8px;border-radius:12px;border:1px solid #ffffff10;background:#ffffff06;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:inherit;font-size:12px;font-weight:600;color:#555}

.lsel option{background:#1a1a22}
.ne{display:flex;align-items:flex-start;gap:8px;background:#ffffff05;border-radius:10px;padding:8px 9px;margin-bottom:6px;border:1px solid #ffffff08}
.cb{display:flex;align-items:center;gap:6px;padding:8px 11px;background:#ffffff06;border:1px dashed #ffffff18;border-radius:10px;color:#666;font-size:11px;cursor:pointer;font-family:inherit;width:100%;justify-content:center;margin-top:4px}
.cb.on{background:#f59e0b10;border-color:#f59e0b40;color:#f59e0b}
.anb{display:flex;align-items:center;gap:5px;background:none;border:1px dashed #ffffff15;border-radius:10px;padding:8px;color:#444;cursor:pointer;font-size:12px;width:100%;justify-content:center;font-family:inherit;margin-top:4px}
.bsave{width:100%;padding:13px;border-radius:14px;background:linear-gradient(135deg,#a78bfa,#6366f1);border:none;color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px}

.bback{padding:13px 15px;border-radius:14px;background:#ffffff08;border:1px solid #ffffff10;color:#666;cursor:pointer;font-family:inherit;font-size:14px;flex-shrink:0}
.bmemo{background:linear-gradient(135deg,#f59e0b,#ef4444)}
.dots{display:flex;gap:6px;justify-content:center;margin-bottom:12px}
.dot{width:6px;height:6px;border-radius:50%;background:#ffffff12}

.recap-box::-webkit-scrollbar{display:none}

.cbtn{width:calc(100% - 28px);margin:8px 14px 0;padding:11px;border-radius:13px;background:#18181f;border:1px solid #ffffff10;color:#a78bfa;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}

.vt{flex:1;padding:8px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;color:#555;background:none}

.ms{display:flex;gap:7px;padding:0 14px 10px;overflow-x:auto}
.ms::-webkit-scrollbar{display:none}

.om{font-size:11px;color:#666;line-height:1.5;background:#ffffff04;border-radius:7px;padding:6px 8px;border:1px solid #ffffff06;margin-top:5px}

.gh{padding:11px 13px;display:flex;justify-content:space-between;align-items:center}
.gb{padding:0 13px 10px;border-top:1px solid #ffffff08}
.or{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid #ffffff06}
.or:last-child{border-bottom:none}
.nb2{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 5px;border-radius:10px;background:#a78bfa18;color:#a78bfa;font-size:10px;font-weight:700;margin-left:5px}

.si-wrap{position:relative;margin-bottom:6px}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#444;pointer-events:none}

  step:1,ph:null,fr:false,ft:'',sr:'',at:'',lb:'',ns:[{t:'',p:false}],mt:'',oc:null};

function render(){
  document.getElementById('screen').innerHTML=getScr();
  ['home','recap','trade'].forEach(t=>{const e=document.getElementById('nb-'+t);if(e)e.className='nb'+(S.tab===t?' on':'');});
  const fv=document.getElementById('fsv'),fn=document.getElementById('fsn');
  if(fv)fv.className='fab-sub fv'+(S.fab?'':' hide');
  if(fn)fn.className='fab-sub fn'+(S.fab?'':' hide');
  const ex=document.getElementById('MOV');if(ex)ex.remove();
  if(S.modal){const d=document.createElement('div');d.id='MOV';d.className='overlay';
    d.innerHTML=S.modal==='visite'?getVM():getMM();d.onclick=e=>{if(e.target===d)closeM();};document.body.appendChild(d);}
}

function getScr(){
  if(S.tab==='home')return getH();
  if(S.tab==='recap')return getRec();
  if(S.tab==='trade')return getTr();return'';
}

function getH(){
  const vs=S.items.filter(i=>i.type==='v'),ms=S.items.filter(i=>i.type==='m');
  const cmd=vs.filter(v=>v.at==='commande').length,gar=vs.filter(v=>v.at==='garantie').length;
  const sorted=[...S.items].sort((a,b)=>a.h.localeCompare(b.h));
  return`<div class="hdr"><div class="hdr-date">${td()}</div><div class="hdr-title">Ma tournee</div><div class="hdr-sub">DBN Developpement · Paris</div></div>
  <div class="stat-row">
    <div class="sc"><div class="sc-n" style="color:#f0f0f8">${vs.length}</div><div class="sc-l">Visites</div></div>
    <div class="sc"><div class="sc-n" style="color:#22c55e">${cmd}</div><div class="sc-l">Commandes</div></div>
    <div class="sc"><div class="sc-n" style="color:#f59e0b">${gar}</div><div class="sc-l">Garanties</div></div>
    <div class="sc"><div class="sc-n" style="color:#555">${ms.length}</div><div class="sc-l">Memos</div></div>
  </div>
  <div class="div"></div><div class="sl">Chronologie du jour</div>
  ${sorted.map(i=>i.type==='v'?rVC(i):rQC(i)).join('')}
  ${S.items.length===0?'<div class="empty">🗺️<br>Aucune activite<br>Appuie sur + pour commencer</div>':''}`;
}

function rVC(item){
  const t=TP.find(t=>t.id===item.at)||TP[3];
  const ns=item.ns||[];const isO=S.oc===item.id;
  return`<div class="card" onclick="togC(${item.id})">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:#e8e8f2;margin-bottom:3px">${es(item.ph)}</div>
        ${item.ad?`<div style="font-size:10px;color:#444;margin-bottom:4px">${es(item.ad)}${item.cp?' · '+item.cp:''}</div>`:''}
        <span class="tag" style="background:${t.c}18;color:${t.c};border:1px solid ${t.c}28">${t.e} ${t.l}${item.lb?' · '+es(item.lb):''}</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;margin-left:8px;flex-shrink:0">
        <span style="font-size:11px;color:#333;font-family:'DM Mono',monospace">${item.h}</span>
        ${ns.length?`<span class="tag" style="background:#a78bfa12;color:#a78bfa;border:1px solid #a78bfa20;font-size:9px">${ns.length} note${ns.length>1?'s':''}</span>`:''}
      </div>
    </div>
    ${isO&&ns.length?`<div style="margin-top:8px">${ns.map((n,i)=>`<div class="note-row"><span class="note-num">${i+1}</span><div><div style="font-size:12px;color:#888;line-height:1.5">${es(n.t)}</div>${n.p?'<div style="font-size:10px;color:#d97706;margin-top:3px">📷 Photo jointe</div>':''}</div></div>`).join('')}</div>`:''}
    ${isO?`<button onclick="event.stopPropagation();delI(${item.id})" style="background:none;border:none;cursor:pointer;color:#444;font-size:11px;margin-top:7px;font-family:inherit">🗑 Supprimer</button>`:''}
  </div>`;
}

function rQC(item){
  return`<div class="qcard">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
      <span class="tag" style="background:#f59e0b15;color:#fbbf24;border:1px solid #f59e0b28">📝 Memo rapide</span>
      <div style="display:flex;align-items:center;gap:8px"><span style="font-size:11px;color:#333;font-family:'DM Mono',monospace">${item.h}</span>
      <button onclick="delI(${item.id})" style="background:none;border:none;cursor:pointer;color:#333;font-size:18px">×</button></div>
    </div>
    <div style="font-size:12px;color:#888;line-height:1.6">${es(item.mt)}</div>
  </div>`;
}

function getRec(){
  const vs=S.items.filter(i=>i.type==='v'),ms=S.items.filter(i=>i.type==='m');
  const tn=vs.reduce((a,v)=>a+(v.ns||[]).length,0);
  const AL={commande:'Commande',garantie:'Garantie',ug:'UG',autre:'Autre'};
  const AI={commande:'🛒',garantie:'🔄',ug:'🎁',autre:'📝'};
  const lines=[`📋 TOURNEE — ${td().toUpperCase()}`,'─'.repeat(38),
    ...vs.map((v,i)=>{const nl=(v.ns||[]).map((n,j)=>`   ${j+1}. ${n.t}${n.p?' [📷]':''}`);
      return[`${i+1}. ${v.ph}  🕐 ${v.h}`,v.ad?`   📍 ${v.ad}${v.cp?' · '+v.cp:''}`:null,
        `   ${AI[v.at]||'📝'} ${AL[v.at]||''}${v.lb?' · '+v.lb:''}`, ...nl].filter(Boolean).join('\n');}),
    ms.length?['─── MEMOS ───',...ms.map(m=>`🟡 ${m.h}  ${m.mt}`)].join('\n'):'',
    '─'.repeat(38),`${vs.length} visite(s) · ${vs.filter(v=>v.at==='commande').length} commande(s) · ${vs.filter(v=>v.at==='garantie').length} garantie(s)`
  ].filter(Boolean).join('\n');
  return`<div class="hdr"><div class="hdr-date">${td()}</div><div class="hdr-title">Recap du jour</div><div class="hdr-sub">${vs.length} visites · ${tn} notes</div></div>
  <div class="recap-box">${es(lines)}</div>
  <button class="pbtn" onclick="doPrint()">🖨️ Generer le PDF</button>
  <button class="cbtn" id="cbtn" onclick="doCP()">📋 Copier le recap</button>`;
}

function getTr(){
  const v=S.tv,ops=TD.filter(o=>{const m=o.mois.normalize('NFD').replace(/[\u0300-\u036f]/g,'');return m===S.tm.normalize('NFD').replace(/[\u0300-\u036f]/g,'')&&(S.tg==='Tous'||o.groupement===S.tg);});
  const gm={};TD.forEach(o=>{if(!gm[o.groupement])gm[o.groupement]=[];gm[o.groupement].push(o);});
  const gs=Object.entries(gm).sort(([a],[b])=>a.localeCompare(b));
  return`<div class="hdr"><div class="hdr-date">Plan commercial 2026</div><div class="hdr-title">Ops Trade <span class="nb2">${TD.length}</span></div><div class="hdr-sub">Juin → Decembre 2026</div></div>
  <div class="vtog"><button class="vt ${v==='mois'?'on':''}" onclick="stv('mois')">📅 Par mois</button><button class="vt ${v==='groupement'?'on':''}" onclick="stv('groupement')">🏢 Par groupement</button></div>
  ${v==='mois'?`
  <div class="ms">${AM.map(m=>`<button class="mp ${S.tm===m?'on':''}" onclick="stm('${m}')">${ME[m.split(' ')[0]]||ME[m]||''} ${m}</button>`).join('')}</div>
  <div class="gsw"><select class="gs" onchange="stg(this.value)">
    <option value="Tous">Tous les groupements</option>
    ${AG.map(g=>`<option value="${es(g)}" ${S.tg===g?'selected':''}>${es(g)}</option>`).join('')}
  </select></div>
  <div class="sl">${S.tm} <span class="nb2">${ops.length}</span></div>
  ${ops.length===0?`<div class="empty">Aucune operation<br>pour cette selection</div>`:''}
  ${ops.map(o=>{const c=pc(o.produit);return`<div class="opc" style="border-left-color:${c}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div style="flex:1"><div style="font-size:12px;font-weight:700;color:#e8e8f2;margin-bottom:2px">${es(o.produit)}</div><div style="font-size:11px;color:#555;font-weight:600">${es(o.groupement)}</div></div>
      <span class="ob" style="background:${c}18;color:${c};border:1px solid ${c}28;margin-left:8px;flex-shrink:0">${es(o.type)}</span>
    </div><div class="om">${es(o.mecanique)}</div></div>`;}).join('')}`:
  `<div style="padding:0 14px">${gs.map(([g,go])=>{const io=S.og===g;const so=go.sort((a,b)=>MO.indexOf(a.mois.split(' ')[0])-MO.indexOf(b.mois.split(' ')[0]));
    return`<div class="gc"><div class="gh" onclick="tog('${g.replace(/'/g,"\\'")}')">
      <div><div style="font-size:13px;font-weight:700;color:#e8e8f2">${es(g)}</div><div style="font-size:10px;color:#444;margin-top:2px">${[...new Set(go.map(o=>o.mois))].join(' · ')}</div></div>
      <div style="display:flex;align-items:center;gap:7px"><span class="nb2">${go.length}</span><span style="color:#333;font-size:13px;display:inline-block;transform:${io?'rotate(180deg)':'none'};transition:transform .2s">▾</span></div>
    </div>${io?`<div class="gb">${so.map(o=>{const c=pc(o.produit);return`<div class="or"><div style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0;margin-top:4px"></div><div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-size:12px;font-weight:600;color:#d4d4e8">${es(o.produit)}</span><span style="font-size:11px;font-weight:700;color:${c};font-family:'DM Mono',monospace">${o.mois}</span></div><div style="font-size:10px;color:#555;line-height:1.4">${es(o.mecanique)}</div></div></div>`;}).join('')}</div>`:''}</div>`;}).join('')}</div>`}`;
}

function getVM(){
  const s=S.step;
  const rs=S.sr.length>1?DB.filter(p=>p.n.toLowerCase().includes(S.sr.toLowerCase())||p.a.toLowerCase().includes(S.sr.toLowerCase())).slice(0,7):[];
  return`<div class="modal" onclick="event.stopPropagation()"><div class="mh"></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:16px;font-weight:700;color:#f0f0f8">🏥 Nouvelle visite</span>
    <button onclick="closeM()" style="background:#ffffff10;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;color:#777;font-size:16px">×</button>
  </div>
  <div class="dots"><div class="dot ${s>=1?'on':''}"></div><div class="dot ${s>=2?'on':''}"></div></div>
  ${s===1?`<div class="fl">Pharmacie</div>
  ${S.ph?`<div class="sel-p"><div style="flex:1"><div style="font-size:13px;color:#c4b5fd;font-weight:600">${es(S.ph.n)}</div>${S.ph.a?`<div style="font-size:10px;color:#555;margin-top:2px">${es(S.ph.a)}${S.ph.c?' · '+S.ph.c:''}</div>`:''}</div><button onclick="clrP()" style="background:none;border:none;cursor:pointer;color:#666;font-size:18px">×</button></div>`:
  S.fr?`<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:#f59e0b15;color:#fbbf24;border:1px solid #f59e0b30">✏️ Saisie libre</span>
  <input class="inp" style="margin-top:8px;margin-bottom:6px" placeholder="Nom de la pharmacie…" value="${es(S.ft)}" oninput="S.ft=this.value" autofocus/>
  <button style="background:none;border:none;color:#444;cursor:pointer;font-size:11px;text-decoration:underline;font-family:inherit" onclick="S.fr=false;render()">← Retour à la recherche</button>`:
  `<div class="si-wrap"><span class="si"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
  <input class="inp sinp" placeholder="Rechercher une pharmacie…" value="${es(S.sr)}" oninput="srP(this.value)" autofocus/></div>
  <div class="pl">${rs.map(p=>`<div class="po" onclick='selP(${JSON.stringify(p)})'><div style="font-weight:500;color:#ccc">${es(p.n)}</div>${p.a?`<div style="font-size:10px;color:#555;margin-top:1px">${es(p.a)}${p.c?' · '+p.c:''}</div>`:''}</div>`).join('')}
  ${S.sr.length>1&&rs.length===0?`<div style="text-align:center;padding:10px;color:#444;font-size:12px">Introuvable — <button onclick="S.fr=true;render()" style="background:none;border:none;color:#a78bfa;cursor:pointer;font-weight:700">saisir manuellement</button></div>`:''}</div>
  ${!S.sr?`<button style="background:none;border:none;color:#444;cursor:pointer;font-size:11px;text-decoration:underline;font-family:inherit;margin-top:6px;display:block" onclick="S.fr=true;render()">Pharmacie absente de la liste →</button>`:''}`}
  <button class="bsave" ${!S.ph&&!(S.fr&&S.ft.trim())?'disabled':''} onclick="goS2()" style="margin-top:14px">Continuer →</button>`:
  `<div class="fl">Type d'action</div>
  <div class="type-grid">${TP.map(t=>`<button class="type-btn ${S.at===t.id?'on':''}" onclick="setAT('${t.id}')" style="${S.at===t.id?`border-color:${t.c};color:${t.c};background:${t.c}10`:''}"><span style="font-size:20px">${t.e}</span>${t.l}</button>`).join('')}</div>
  ${['commande','garantie','ug'].includes(S.at)?`<div class="fl" style="margin-top:4px">Laboratoire</div><select class="lsel" onchange="S.lb=this.value" style="margin-bottom:12px"><option value="">Choisir un labo…</option>${LB.map(l=>`<option value="${l}" ${S.lb===l?'selected':''}>${l}</option>`).join('')}</select>`:''}
  <div class="fl" style="margin-top:4px">Notes</div>
  ${S.ns.map((n,i)=>`<div class="ne"><div style="flex:1"><textarea class="ta" style="min-height:50px" placeholder="Note ${i+1}…" oninput="updN(${i},this.value)">${es(n.t)}</textarea><button class="cb ${n.p?'on':''}" onclick="togP(${i})">📷 ${n.p?'Photo ajoutee ✓':'Ajouter photo'}</button></div>${S.ns.length>1?`<button onclick="rmN(${i})" style="background:none;border:none;cursor:pointer;color:#444;font-size:18px;margin-top:4px;flex-shrink:0">×</button>`:''}</div>`).join('')}
  <button class="anb" onclick="addN()">+ Ajouter une note</button>
  <div style="display:flex;gap:8px;margin-top:14px">
    <button class="bback" onclick="S.step=1;render()">←</button>
    <button class="bsave" style="margin-top:0;flex:1" ${!S.at||(['commande','garantie','ug'].includes(S.at)&&!S.lb)?'disabled':''} onclick="svV()">✓ Enregistrer</button>
  </div>`}</div>`;
}

function getMM(){
  return`<div class="modal" onclick="event.stopPropagation()"><div class="mh"></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:16px;font-weight:700;color:#f0f0f8">📝 Memo rapide</span>
    <button onclick="closeM()" style="background:#ffffff10;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;color:#777;font-size:16px">×</button>
  </div>
  <div style="font-size:12px;color:#444;margin-bottom:12px">Note libre — concurrent, info marche…</div>
  <div class="fl">Note</div>
  <textarea class="ta" style="min-height:100px" placeholder="Ex: Produit concurrent vu en rayon…" oninput="S.mt=this.value" autofocus>${es(S.mt)}</textarea>
  <button class="bsave bmemo" ${!S.mt.trim()?'disabled':''} onclick="svM()">✓ Enregistrer le memo</button>
  </div>`;
}

function showTab(t){S.tab=t;S.fab=false;render();}
function toggleFab(){S.fab=!S.fab;render();}
function openModal(m){S.modal=m;S.fab=false;S.step=1;S.ph=null;S.fr=false;S.ft='';S.sr='';S.at='';S.lb='';S.ns=[{t:'',p:false}];S.mt='';render();}
function closeM(){S.modal=null;render();}
function togC(id){S.oc=S.oc===id?null:id;render();}
function delI(id){S.items=S.items.filter(i=>i.id!==id);S.oc=null;render();}
function srP(v){S.sr=v;render();}
function selP(p){S.ph=p;S.sr='';render();}
function clrP(){S.ph=null;S.fr=false;S.sr='';render();}
function goS2(){if(S.fr&&S.ft.trim())S.ph={n:S.ft.trim(),a:'',c:''};S.step=2;render();}
function setAT(t){S.at=t;S.lb='';render();}
function addN(){S.ns=[...S.ns,{t:'',p:false}];render();}
function rmN(i){S.ns=S.ns.filter((_,j)=>j!==i);render();}
function updN(i,v){S.ns=S.ns.map((n,j)=>j===i?{...n,t:v}:n);}
function togP(i){S.ns=S.ns.map((n,j)=>j===i?{...n,p:!n.p}:n);render();}
function stv(v){S.tv=v;render();}
function stm(m){S.tm=m;render();}
function stg(g){S.tg=g;render();}
function tog(g){S.og=S.og===g?null:g;render();}
function svV(){const vn=S.ns.filter(n=>n.t.trim()||n.p);S.items=[...S.items,{id:Date.now(),type:'v',ph:S.ph.n,ad:S.ph.a,cp:S.ph.c,h:nt(),at:S.at,lb:S.lb,ns:vn}];closeM();}
function svM(){S.items=[...S.items,{id:Date.now(),type:'m',h:nt(),mt:S.mt}];closeM();}

function doCP(){
  const vs=S.items.filter(i=>i.type==='v'),ms=S.items.filter(i=>i.type==='m');
  const AL={commande:'Commande',garantie:'Garantie',ug:'UG',autre:'Autre'};
  const AI={commande:'🛒',garantie:'🔄',ug:'🎁',autre:'📝'};
  const lines=[`📋 TOURNEE — ${td().toUpperCase()}`,'─'.repeat(38),
    ...vs.map((v,i)=>{const nl=(v.ns||[]).map((n,j)=>`   ${j+1}. ${n.t}${n.p?' [📷]':''}`);
      return[`${i+1}. ${v.ph}  🕐 ${v.h}`,v.ad?`   📍 ${v.ad}${v.cp?' · '+v.cp:''}`:null,
        `   ${AI[v.at]||'📝'} ${AL[v.at]||''}${v.lb?' · '+v.lb:''}`, ...nl].filter(Boolean).join('\n');}),
    ms.length?['─── MEMOS ───',...ms.map(m=>`🟡 ${m.h}  ${m.mt}`)].join('\n'):'',
    '─'.repeat(38),`${vs.length} visite(s) · ${vs.filter(v=>v.at==='commande').length} commande(s) · ${vs.filter(v=>v.at==='garantie').length} garantie(s)`
  ].filter(Boolean).join('\n');
  navigator.clipboard?.writeText(lines).then(()=>{const b=document.getElementById('cbtn');if(b){b.textContent='✓ Copie !';setTimeout(()=>b.textContent='📋 Copier le recap',2000);}});
}

function doPrint(){
  const vs=S.items.filter(i=>i.type==='v'),ms=S.items.filter(i=>i.type==='m');
  const tn=vs.reduce((a,v)=>a+(v.ns||[]).length,0);
  const AC={commande:'#22c55e',garantie:'#f59e0b',ug:'#a78bfa',autre:'#64748b'};
  const AL={commande:'Commande',garantie:'Garantie',ug:'UG',autre:'Autre'};
  const d=td();
  const vH=vs.map((v,i)=>{const c=AC[v.at]||'#64748b';const l=AL[v.at]||'';
    const nH=(v.ns||[]).map((n,j)=>`<div style="display:flex;align-items:flex-start;gap:8px;padding:5px 0;${j>0?'border-top:1px dashed #f1f5f9':''}"><div style="min-width:16px;height:16px;border-radius:50%;background:#a78bfa15;color:#a78bfa;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0">${j+1}</div><div style="font-size:9px;color:#334155;line-height:1.5">${n.t}${n.p?'<span style="margin-left:6px;padding:1px 4px;border-radius:3px;background:#f59e0b10;color:#d97706;font-size:7px;font-weight:700">📷 Photo</span>':''}</div></div>`).join('');
    return`<div style="border:1px solid #e2e8f0;border-radius:8px;margin-bottom:10px;overflow:hidden;page-break-inside:avoid"><div style="background:#f8fafc;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e2e8f0"><div><div style="font-size:11px;font-weight:800;color:#0f172a">${v.ph}</div>${v.ad?`<div style="font-size:8px;color:#94a3b8;margin-top:1px">${v.ad}${v.cp?' · '+v.cp:''}</div>`:''}</div><div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:10px"><span style="font-size:9px;color:#94a3b8;font-family:monospace">${v.h}</span><span style="padding:2px 7px;border-radius:4px;font-size:8px;font-weight:800;background:${c}18;color:${c};border:1px solid ${c}30">${l}</span></div></div><div style="padding:9px 12px">${v.lb?`<div style="font-size:9px;color:#64748b;margin-bottom:6px">Laboratoire : <strong style="color:#334155">${v.lb}</strong></div>`:''}<div>${nH}</div></div></div>`;}).join('');
  const mH=ms.map(m=>`<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:7px 10px;margin-bottom:6px;display:flex;gap:8px;font-size:9px"><span style="color:#d97706;font-family:monospace;font-weight:700;flex-shrink:0">${m.h}</span><span style="color:#78350f;line-height:1.5">${m.mt}</span></div>`).join('');

  <div style="padding:18px 24px"><div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;border-bottom:2px solid #f1f5f9;margin-bottom:16px"><div><div style="font-size:14px;font-weight:800;color:#0f172a">Rapport de tournee</div><div style="font-size:9px;color:#94a3b8;margin-top:2px">${d}</div></div><div style="display:flex;gap:8px">${[[vs.length,'Visites','#0f172a'],[vs.filter(v=>v.at==='commande').length,'Commandes','#22c55e'],[vs.filter(v=>v.at==='garantie').length,'Garanties','#f59e0b'],[tn,'Notes','#a78bfa']].map(([n,l,c])=>`<div style="text-align:center;background:#f8fafc;border-radius:8px;padding:6px 10px;border:1px solid #e2e8f0"><div style="font-size:16px;font-weight:800;color:${c}">${n}</div><div style="font-size:7px;color:#94a3b8;font-weight:700;text-transform:uppercase">${l}</div></div>`).join('')}</div></div>
  ${vs.length?`<div style="font-size:9px;font-weight:800;color:#a78bfa;text-transform:uppercase;margin-bottom:10px">Visites du jour</div>${vH}`:''}
  ${ms.length?`<div style="font-size:9px;font-weight:800;color:#f59e0b;text-transform:uppercase;margin:14px 0 8px">Memos rapides</div>${mH}`:''}
  <div style="margin-top:16px;padding-top:8px;border-top:1px solid #e2e8f0;display:flex;justify-content:space-between;font-size:8px;color:#94a3b8"><span>DBN Developpement — Rapport genere automatiquement</span><span>Page 1 / 1</span></div></div></body></html>`;
  const w=window.open('','_blank');if(w){w.document.write(html);w.document.close();setTimeout(()=>w.print(),500);}

}
